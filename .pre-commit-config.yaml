repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/.*\.(py|pyi)$
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/.*\.(py|pyi)$
      - id: pytest-pre-push
        name: pytest -q (pre-push)
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
